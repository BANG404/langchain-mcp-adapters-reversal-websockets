name: release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        required: false
        type: boolean
        default: false
        description: "Compute the next version without committing or tagging"
  push:
    tags:
      - "v[0-9]*"

env:
  PYTHON_VERSION: "3.11"
  UV_FROZEN: "true"
  UV_NO_SYNC: "true"

jobs:
  prepare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.prepare-release.outputs.released }}
      tag: ${{ steps.prepare-release.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python + uv
        uses: "./.github/actions/uv_setup"
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Prepare release
        id: prepare-release
        env:
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python3 scripts/release.py --dry-run
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            before="$(git rev-parse HEAD)"
            python3 scripts/release.py --ci
            after="$(git rev-parse HEAD)"
            if [ "$before" = "$after" ]; then
              echo "released=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            tag="$(git describe --tags --exact-match HEAD)"
            git push origin "HEAD:${GITHUB_REF_NAME}" "$tag"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs:
      - prepare
    if: |
      always() &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        needs.prepare.outputs.released == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      pkg-name: ${{ steps.check-version.outputs.pkg-name }}
      version: ${{ steps.check-version.outputs.version }}
      release-tag: ${{ steps.release-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.prepare.outputs.tag || github.ref }}

      - name: Set up Python + uv
        uses: "./.github/actions/uv_setup"
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build project for distribution
        run: uv build

      - name: Set release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ needs.prepare.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Check Version
        id: check-version
        shell: python
        run: |
          import os
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          pkg_name = data["project"]["name"]
          version = data["project"]["version"]
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"pkg-name={pkg_name}\n")
              f.write(f"version={version}\n")

  publish:
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      needs.build.outputs.release-tag != ''
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          verbose: true
          print-hash: true
          attestations: false

  mark-release:
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      needs.build.outputs.release-tag != ''
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: "dist/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ needs.build.outputs.release-tag }}
          makeLatest: true
